  flinktaskmanager:
    build: ./streaming/flink-java
    image: graduation-project-flinktaskmanager
    depends_on:
      - flinkjobmanager
      - kafka
      - postgres-db
    command: [ "taskmanager" ]
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: 2G
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9093
      - JOB_MANAGER_RPC_ADDRESS=flinkjobmanager
      - JDBC_URL=jdbc:postgresql://postgres-db:5432/logging_db
      - JDBC_USER=mohamed
      - JDBC_PASSWORD=mohamed
      - FLINK_PARALLELISM=1
      - CHECKPOINT_INTERVAL_MS=60000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - data-platform-net
