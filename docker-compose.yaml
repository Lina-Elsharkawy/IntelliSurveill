services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    env_file:
      - ./backend/.env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9093
    ports:
      - "3000:3000"
    depends_on:
      - postgres-db
    networks:
      - data-platform-net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped

    ports:
      - "11434:11434"

    volumes:
      - ollama-data:/root/.ollama

    environment:
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1 #llm only

    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

    networks:
      - data-platform-net
  vector-match:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./backend/services:/app/services
    environment:
      DB_DSN: postgresql://lina:123@postgres-db:5432/lina
      DATABASE_URL: postgresql://lina:123@postgres-db:5432/lina
  
    env_file:
      - ./backend/.env
    command: >
      sh -c "pip install -r /app/services/vector_match/requirements.txt &&
             python -m uvicorn services.vector_match.app:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - postgres-db
    networks:
      - data-platform-net

  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    ports:
      - "9093:9093"
    environment:
      - KAFKA_LISTENERS=PLAINTEXT://:9093,CONTROLLER://:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9093
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9094
    env_file:
      - ./streaming/kafka/.env
    volumes:
      - kafka-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - data-platform-net

  kafka-topic-init:
   image: python:3.11-slim
   working_dir: /app
   volumes:
    - ./streaming/kafka:/app
   env_file:
    - ./streaming/kafka/.env
   command: sh -c "pip install -r requirements.txt && python create_topics.py --bootstrap-servers kafka:9093"
   depends_on:
    - kafka
   networks:
    - data-platform-net
    
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
     - "9000:9000"   # S3 API
     - "9001:9001"   # Web console
    env_file:
     - ./streaming/minio/.env
    volumes:
     - minio-data:/data
    networks:
      - data-platform-net


  postgres-db:
    image: pgvector/pgvector:pg16
    restart: always
    ports:
      - "5432:5432"
    shm_size: 128mb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    env_file:
      - ./backend/.env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER" ]
      interval: 5s
      timeout: 5s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - data-platform-net

  db-migrator:
    build: ./backend/db/migrations
    depends_on:
      postgres-db:
        condition: service_healthy
    env_file:
      - ./backend/logging.env
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    volumes:
      - ./backend/seeds/seed.sql:/app/seed.sql
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - data-platform-net

  pgadmin:
    image: dpage/pgadmin4:9
    restart: always
    env_file:
      - ./backend/db/pgadmin.env
    ports:
      - "5050:80"
    depends_on:
      - postgres-db
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - data-platform-net

  flinkjobmanager:
    build: ./streaming/flink-java
    image: graduation-project-flinkjobmanager
    command: [ "jobmanager" ]
    ports:
      - "8081:8081"
      - "9249:9249" # Prometheus metrics
    depends_on:
      - kafka
      - postgres-db
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: 2G
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9093
      - JOB_MANAGER_RPC_ADDRESS=flinkjobmanager
      - JDBC_URL=jdbc:postgresql://postgres-db:5432/logging_db
      - JDBC_USER=mohamed
      - JDBC_PASSWORD=mohamed
      - FLINK_PARALLELISM=1
      - CHECKPOINT_INTERVAL_MS=60000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - data-platform-net

  # prometheus:
