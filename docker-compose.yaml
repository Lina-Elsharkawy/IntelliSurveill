services:
  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9091
      KAFKA_LISTENERS: CONTROLLER://kafka:9091,PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CLUSTER_ID: "my-cluster-id"
    volumes:
      - kafka-data:/var/lib/kafka/data

  postgres-db:
    image: postgres:18
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: Access_control_logging # Replace with your desired database name
      POSTGRES_USER: admin # Replace with your desired username
      POSTGRES_PASSWORD: admin # Replace with your desired strong password

  pg-adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

  flinkjobmanager:
    image: flink:2.2
    ports:
      - "8081:8081"
    command: ["jobmanager"]
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flinkjobmanager

  flinktaskmanager:
    image: flink:2.2
    depends_on:
      - flinkjobmanager
    command: ["taskmanager"]
    deploy:
      replicas: 1
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flinkjobmanager
        taskmanager.numberOfTaskSlots: 2

volumes:
  pgdata:
  kafka-data:
