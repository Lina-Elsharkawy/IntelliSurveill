services:
  # ---------------------------
  # Mediamtx Service
  # ---------------------------
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    ports:
      - "8554:8554"
      - "8889:8889"
      - "8189:8189/udp"
      - "10000:10000/udp"
      - "5004:5004/udp"
    volumes:
      - ./mediamtx.yml:/mediamtx.yaml
    command: /mediamtx.yaml
    restart: unless-stopped

  # ---------------------------
  # Backend Services
  # ---------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    env_file:
      - ./backend/.env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9093
      - VECTOR_MATCH_URL=http://vector-match:8000
      - CHATBOT_SERVICE_URL=http://chatbot-service:8000
    ports:
      - "3000:3000"
    depends_on:
      - postgres-db
    networks:
      - data-platform-net

  # ---------------------------
  #  ollama Services
  #----------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "11435:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_GPU_OVERHEAD=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama serve &
        sleep 8
        ollama list | grep -q "moondream:latest" && ollama rm moondream:latest
        ollama list | grep -q "llama3.2:1b" && ollama rm llama3.2:1b
        ollama list | grep -q "openbmb/minicpm-v4.5:8b" || ollama pull openbmb/minicpm-v4.5:8b
        ollama list | grep -q "qwen3:8b" || ollama pull qwen3:8b
        wait
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - data-platform-net
  ollama-chatbot:
    image: ollama/ollama:latest
    container_name: ollama-chatbot
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "11436:11434"
    volumes:
      - ollama-chatbot-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_GPU_OVERHEAD=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama serve &
        sleep 8
        ollama list | grep -q "qwen2.5-coder:3b" && ollama rm qwen2.5-coder:3b
        ollama list | grep -q "qwen2.5-coder:7b" || ollama pull qwen2.5-coder:7b
        wait
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - data-platform-net

  ollama-rules:
    image: ollama/ollama:latest
    container_name: ollama-rules
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "11437:11434"
    volumes:
      - ollama-rules-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_GPU_OVERHEAD=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama serve &
        sleep 8
        ollama list | grep -q "qwen2.5:3b" || ollama pull qwen2.5:3b
        wait
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - data-platform-net
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "2"
    #       memory: 4G

    # deploy:
    #   resources:
    #     limits:
    #       cpus: "2"
    #       memory: 4G

    # deploy:
    #   resources:
    #     limits:
    #       cpus: "2"
    #       memory: 4G
    # ---------------------------
    # Face Detection Services
    #----------------------------
  vector-match:
    build:
      context: .
      dockerfile: backend/services/vector_match/Dockerfile
    environment:
      DB_DSN: postgresql://lina:123@postgres-db:5432/lina
      DATABASE_URL: postgresql://lina:123@postgres-db:5432/lina
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres-db:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\" || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - data-platform-net

  # ---------------------------
  #  Anomaly Detection Services
  #----------------------------
  vad-service:
    build:
      context: ./backend/services/vad_service
      dockerfile: Dockerfile
    working_dir: /app

    # GPU access for YOLO / future gates
    gpus: all

    env_file:
      - ./backend/.env

    environment:
      # ------------------------------------------------------------------
      # Database
      # ------------------------------------------------------------------
      DB_DSN: postgresql://lina:123@postgres-db:5432/lina
      DATABASE_URL: postgresql://lina:123@postgres-db:5432/lina

      # ------------------------------------------------------------------
      # NVIDIA / GPU
      # ------------------------------------------------------------------
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

      # ------------------------------------------------------------------
      # RTSP stability
      # ------------------------------------------------------------------
      OPENCV_FFMPEG_CAPTURE_OPTIONS: rtsp_transport;tcp|stimeout;5000000

      # ------------------------------------------------------------------
      # Backend-direct RTSP VAD path
      # ------------------------------------------------------------------
      VAD_BACKEND_DIRECT_ENABLED: "1"
      VAD_AUTOSTART: "0"

      VAD_RTSP_URL_ENV_VAR: VAD_RTSP_URL_LAB_CAM_02

      VAD_STREAM_KEY: lab_cam_02
      VAD_CAMERA_KEY: lab_cam_02
      VAD_CAMERA_ID: "2"

      VAD_TARGET_SAMPLE_FPS: "5.0"
      VAD_ROLLING_BUFFER_SEC: "30"
      VAD_DEBUG_SAVE_DIR: /app/debug_vad
      VAD_DEBUG_SAVE_EVERY_N_FRAMES: "0"
      VAD_DB_INSERT_EVERY_N_FRAMES: "1"

      # ------------------------------------------------------------------
      # Route FPS
      # ------------------------------------------------------------------
      VAD_POSE_ROUTE_FPS: "5.0"
      VAD_DEEP_ROUTE_FPS: "2.5"
      VAD_HOMOGRAPHY_MACRO_ROUTE_FPS: "2.5"

      # ------------------------------------------------------------------
      # Artifact directories inside container
      # ------------------------------------------------------------------
      VAD_DEEP_ARTIFACT_DIR: /models/vad/deep
      VAD_POSE_ARTIFACT_DIR: /models/vad/pose
      VAD_HOMOGRAPHY_MACRO_ARTIFACT_DIR: /models/vad/homography_macro

      # ------------------------------------------------------------------
      # YOLO tracking
      # ------------------------------------------------------------------
      VAD_TRACKING_ENABLED: "1"
      VAD_DETECTOR_MODEL: /models/vad/yolo/yolov8n.pt
      VAD_POSE_MODEL: /models/vad/yolo/yolov8s-pose.pt
      VAD_HOMOGRAPHY_POSE_MODEL: /models/vad/yolo/yolov8s-pose.pt
      VAD_DETECTOR_DEVICE: cuda
      VAD_DETECTOR_CONF: "0.25"
      VAD_DETECTOR_IMGSZ: "640"
      VAD_TRACKER_CONFIG: bytetrack.yaml
      VAD_TRACK_BUFFER_MAX_AGE_SAMPLES: "75"

      # ------------------------------------------------------------------
      # Pose gate
      # ------------------------------------------------------------------
      VAD_POSE_GATE_ENABLED: "1"
      VAD_POSE_TUBELET_FRAMES: "24"
      VAD_POSE_STRIDE: "6"
      VAD_POSE_KPT_CONF: "0.30"
      VAD_POSE_THRESHOLD_KEY: components_8_p95
      VAD_POSE_THRESHOLD_VALUE: "33.168735926695206"
      VAD_POSE_GMM_COMPONENTS: "8"
      VAD_POSE_SMOOTHING_SIGMA: "2.0"
      VAD_POSE_PERSISTENCE_WINDOW: "5"
      VAD_POSE_PERSISTENCE_REQUIRED_HITS: "3"
      VAD_POSE_MIN_EVENT_GAP_SEC: "5.0"
      VAD_POSE_TIME_MODE: "sample"
      VAD_POSE_REINFER_ENABLED: "1"

      # ------------------------------------------------------------------
      # Deep gate
      # ------------------------------------------------------------------
      VAD_DEEP_GATE_ENABLED: "1"
      VAD_DEEP_K: "5"
      VAD_DEEP_THRESHOLD_KEY: p99_5
      VAD_DEEP_THRESHOLD_VALUE: "0.11"
      VAD_DEEP_TUBELET_FRAMES: "16"
      VAD_DEEP_STRIDE: "5"
      VAD_DEEP_BBOX_PAD_RATIO: "0.30"
      VAD_DEEP_CROP_SIZE: "224"
      VAD_DEEP_SMOOTHING_SIGMA: "2.0"
      VAD_DEEP_PERSISTENCE_WINDOW: "1"
      VAD_DEEP_PERSISTENCE_REQUIRED_HITS: "1"
      VAD_DEEP_MIN_EVENT_GAP_SEC: "5.0"
      VAD_DEEP_DEVICE: cuda
      VAD_DEEP_FP16: "1"
      VAD_DEEP_VIDEOMAE_MODEL: MCG-NJU/videomae-base

      # ------------------------------------------------------------------
      # Homography / Macro gate
      # ------------------------------------------------------------------
      VAD_HOMOGRAPHY_MATRIX_PATH: /models/vad/homography_macro/homography_matrix.json
      VAD_HOMOGRAPHY_MACRO_GATE_ENABLED: "1"
      VAD_HOMOGRAPHY_MACRO_TUBELET_FRAMES: "16"
      VAD_HOMOGRAPHY_MACRO_STRIDE: "8"
      VAD_HOMOGRAPHY_MACRO_THRESHOLD_KEY: p99_5
      VAD_HOMOGRAPHY_MACRO_THRESHOLD_VALUE: "14.5168879100055"
      VAD_HOMOGRAPHY_MACRO_GMM_COMPONENTS: "8"
      VAD_HOMOGRAPHY_MACRO_SMOOTHING_SIGMA: "2.0"
      VAD_HOMOGRAPHY_MACRO_PERSISTENCE_WINDOW: "5"
      VAD_HOMOGRAPHY_MACRO_PERSISTENCE_REQUIRED_HITS: "2"
      VAD_HOMOGRAPHY_MACRO_MIN_EVENT_GAP_SEC: "5.0"

      VAD_HOMOGRAPHY_ANKLE_CONF_THRESHOLD: "0.35"
      VAD_HOMOGRAPHY_FALLBACK_MODE: freeze_last_valid
      VAD_HOMOGRAPHY_MAX_FREEZE_SAMPLES: "12"
      VAD_HOMOGRAPHY_STATIONARY_SPEED_THRESHOLD: "0.05"
      VAD_HOMOGRAPHY_TRAJECTORY_SMOOTHING: median_savgol
      VAD_HOMOGRAPHY_TRAJECTORY_SMOOTHING_WINDOW: "5"
      VAD_HOMOGRAPHY_TRAJECTORY_SMOOTHING_POLYORDER: "2"
      VAD_HOMOGRAPHY_REJECT_NONPHYSICAL_STEPS: "1"
      VAD_HOMOGRAPHY_MAX_PLAUSIBLE_SPEED: "3.0"
      VAD_HOMOGRAPHY_MAX_PLAUSIBLE_ACCEL: "6.0"
      VAD_HOMOGRAPHY_MIN_VALID_GROUNDPOINT_RATIO: "0.0"

      # ------------------------------------------------------------------
      # MinIO evidence storage
      # ------------------------------------------------------------------
      VAD_EVIDENCE_ENABLED: "1"
      VAD_MINIO_ENDPOINT: minio:9000
      VAD_MINIO_ACCESS_KEY: minioadmin
      VAD_MINIO_SECRET_KEY: minioadmin123
      VAD_MINIO_SECURE: "0"
      VAD_MINIO_BUCKET: vad-evidence
      VAD_EVIDENCE_PREFIX: vad
      VAD_SAVE_EVIDENCE_ON_GATE_EVENT: "1"
      VAD_SAVE_EVIDENCE_ON_PERSISTENT_HIT: "0"  

      # ------------------------------------------------------------------
      # Deep-only VLM/LLM reasoning queue
      # ------------------------------------------------------------------
      VAD_DEEP_REASONING_ENABLED: "1"
      VAD_DEEP_REASONING_REQUIRE_EVIDENCE: "1"
      VAD_DEEP_REASONING_MIN_RATIO: "1.0"
      VAD_DEEP_REASONING_PROMPT_VERSION: deep_vlm_reasoning_v1
      VAD_DEEP_REASONING_PRIORITY: normal
      VAD_DEEP_REASONING_MAX_ATTEMPTS: "3"
    volumes:
      # Mount source code so future Python edits need restart only, not rebuild
      - ./backend/services/vad_service:/app

      # YOLO model folder
      - ./backend/models/yolo:/models/vad/yolo:ro

      # Gate artifact folders
      - D:/Embeddings_Distribution/normality_models/deep_gate/deep_branch_artifacts_v3_gaussian:/models/vad/deep:ro
      - D:/Embeddings_Distribution/normality_models/pose_gate/pose_micro_gmm_gate_backend_parity_50vid_yolov8s_5fps_24f_s6_allk_allp:/models/vad/pose:ro
      - D:/Embeddings_Distribution/normality_models/homography_gate/homography_gate_live_parity_stage3_pose_contract_fixed_50vid/homography_macro_gmm_gate_allk_p995_p997:/models/vad/homography_macro:ro

      # Debug output
      - ./backend/services/vad_service/debug_vad:/app/debug_vad

    ports:
      - "8015:8000"

    depends_on:
      postgres-db:
        condition: service_healthy
      minio:
        condition: service_started

    networks:
      - data-platform-net
  vad-reasoning-worker:
    build:
      context: ./backend/services/vad_service
      dockerfile: Dockerfile.worker
    working_dir: /app
    command: python -m vad.reasoning_worker
    restart: unless-stopped

    env_file:
      - ./backend/.env

    environment:
      DB_DSN: postgresql://lina:123@postgres-db:5432/lina
      DATABASE_URL: postgresql://lina:123@postgres-db:5432/lina

      VAD_REASONING_WORKER_ENABLED: "1"
      VAD_REASONING_POLL_INTERVAL_SEC: "3"
      VAD_REASONING_BATCH_SIZE: "1"

      VAD_DEEP_REASONING_ENABLED: "1"
      VAD_DEEP_REASONING_REQUIRE_EVIDENCE: "1"
      VAD_DEEP_REASONING_MIN_RATIO: "1.0"
      VAD_DEEP_REASONING_PROMPT_VERSION: deep_vlm_reasoning_v1
      VAD_DEEP_REASONING_MAX_ATTEMPTS: "3"

      VAD_MINIO_ENDPOINT: minio:9000
      VAD_MINIO_ACCESS_KEY: minioadmin
      VAD_MINIO_SECRET_KEY: minioadmin123
      VAD_MINIO_SECURE: "0"
      VAD_MINIO_BUCKET: vad-evidence

      OLLAMA_BASE_URL: http://ollama:11434
      VLM_MODEL: openbmb/minicpm-v4.5:8b
      LLM_MODEL: qwen3:8b

      VAD_REASONING_USE_LLM_NORMALIZER: "1"
      VAD_OLLAMA_TIMEOUT_SEC: "300"
    volumes:
      - ./backend/services/vad_service:/app

    depends_on:
      postgres-db:
        condition: service_healthy
      minio:
        condition: service_started
      ollama:
        condition: service_started

    networks:
      - data-platform-net      
  anomaly-service:
    build:
      context: ./backend/services/anomaly_service
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./backend/services:/app/services
      - ./datasets:/datasets
      - ./backend/services/anomaly_service/models:/app/models
      - ./backend/services/anomaly_service/models/distribution_artifacts:/models/distribution_artifacts:ro
  
    environment:
      DB_DSN: postgresql://lina:123@postgres-db:5432/lina
      DATABASE_URL: postgresql://lina:123@postgres-db:5432/lina
      EVIDENCE_GATEWAY_OBJECT_URL: http://evidence-gateway:8010/evidence/object
      MINIO_ENDPOINT: http://minio:9000
      S3_BUCKET: evidence

      OLLAMA_HOST: http://ollama:11434
      OLLAMA_BASE_URL: http://ollama:11434
      VLM_MODEL: openbmb/minicpm-v4.5:8b
      LLM_MODEL: qwen3:8b

      VIDEO_ENCODER_MODEL: MCG-NJU/videomae-base
      VIDEO_ENCODER_DEVICE: cuda
      VIDEO_ENCODER_USE_FP16: "1"

      TUBELET_FRAMES: "16"
      SAMPLE_FPS: "8"
      STRIDE: "16"
      PERSON_SIZE: "224"
      CONTEXT_SIZE: "224"
      PERSON_PADDING: "0.20"
      CONTEXT_SCALE: "2.5"

      DISTRIBUTION_ARTIFACTS_DIR: /models/distribution_artifacts
      DISTRIBUTION_THRESHOLD_NAME: p97

      HIGH_SPEED_THRESHOLD: "0.24"
      ABRUPT_ANGLE_THRESHOLD: "120"
      MIN_TURN_SPEED: "0.08"
      MAX_TRACK_GAP: "6"
      CANDIDATE_COOLDOWN_SEC: "5"

    env_file:
      - ./backend/.env
    ports:
      - "8002:8000"
    depends_on:
      - postgres-db
      - minio
      - ollama
    networks:
      - data-platform-net
  reasoning-worker:
    build:
      context: ./backend/services/anomaly_service
      dockerfile: Dockerfile
    working_dir: /app
    command: python ollama_worker.py
    volumes:
      - ./backend/services:/app/services
    environment:
      DB_DSN: postgresql://lina:123@postgres-db:5432/lina
      DATABASE_URL: postgresql://lina:123@postgres-db:5432/lina
      EVIDENCE_GATEWAY_OBJECT_URL: http://evidence-gateway:8010/evidence/object
      MINIO_ENDPOINT: http://minio:9000
      S3_BUCKET: evidence

      OLLAMA_HOST: http://ollama:11434
      OLLAMA_BASE_URL: http://ollama:11434
      VLM_MODEL: openbmb/minicpm-v4.5:8b
      LLM_MODEL: qwen3:8b
    env_file:
      - ./backend/.env
    depends_on:
      - postgres-db
      - minio
      - ollama
      - anomaly-service
    networks:
      - data-platform-net
  anomaly-rules-service:
    build:
      context: ./backend/services/Anomaly_Rules
      dockerfile: Dockerfile
    environment:
      DB_DSN: postgresql://lina:123@postgres-db:5432/lina
      OLLAMA_BASE_URL: http://ollama-rules:11434
      LLM_MODEL: qwen2.5:3b
    ports:
      - "8003:8000"
    depends_on:
      - postgres-db
      - ollama-rules
    networks:
      - data-platform-net

  # ---------------------------
  #  DevOps Tools
  #----------------------------
  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    ports:
      - "9093:9093"
      - "9092:9092"
    environment:
      - KAFKA_LISTENERS=INTERNAL://:9093,EXTERNAL://:9092,CONTROLLER://:9094
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9093,EXTERNAL://${HOST_IP}:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9094
    env_file:
      - ./streaming/kafka/.env
    volumes:
      - kafka-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - data-platform-net
      - default

  kafka-topic-init:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./streaming/kafka:/app
    env_file:
      - ./streaming/kafka/.env
    command: sh -c "pip install -r requirements.txt && python create_topics.py --bootstrap-servers kafka:9093"
    depends_on:
      - kafka
    networks:
      - data-platform-net

  event-consumer:
    build:
      context: ./streaming/kafka
      dockerfile: Dockerfile.face-consumer
    container_name: graduation-project-event-consumer-1
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      KAFKA_TOPICS: face_events,anomaly_events,vad.frames.uploaded
      KAFKA_GROUP_ID: backend-consumer
      BACKEND_MATCH_URL: http://vector-match:8000/match
      ANOMALY_INGEST_URL: http://anomaly-service:8000/ingest/person-context-tubelet
      EVIDENCE_GATEWAY_UPLOAD: http://evidence-gateway:8010/evidence/upload
      S3_BUCKET: evidence
    depends_on:
      - kafka
      - vector-match
      - anomaly-service
      - evidence-gateway
    networks:
      - data-platform-net

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    env_file:
      - ./streaming/minio/.env
    volumes:
      - minio-data:/data
    networks:
      - data-platform-net
  evidence-gateway:
    build:
      context: ./edge/services/evidence_gateway
    working_dir: /app
    env_file:
      - ./streaming/minio/.env
    environment:
      MINIO_ENDPOINT: http://minio:9000
      S3_BUCKET: evidence
      PORT: 8010
      MAX_UPLOAD_BYTES: "104857600"
    depends_on:
      - minio
    ports:
      - "8010:8010"
    networks:
      - data-platform-net
      - default

  flinkjobmanager:
    build: ./streaming/flink-java
    image: graduation-project-flinkjobmanager
    command: [ "jobmanager" ]
    ports:
      - "8081:8081"
      - "9249:9249" # Prometheus metrics
    depends_on:
      - kafka
      - postgres-db
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: 2G
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9093
      - JOB_MANAGER_RPC_ADDRESS=flinkjobmanager
      - JDBC_URL=jdbc:postgresql://postgres-db:5432/logging_db
      - JDBC_USER=mohamed
      - JDBC_PASSWORD=mohamed
      - FLINK_PARALLELISM=1
      - CHECKPOINT_INTERVAL_MS=60000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - data-platform-net

  flinktaskmanager:
    build: ./streaming/flink-java
    image: graduation-project-flinktaskmanager
    depends_on:
      - flinkjobmanager
      - kafka
      - postgres-db
    command: [ "taskmanager" ]
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: 2G
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9093
      - JOB_MANAGER_RPC_ADDRESS=flinkjobmanager
      - JDBC_URL=jdbc:postgresql://postgres-db:5432/logging_db
      - JDBC_USER=mohamed
      - JDBC_PASSWORD=mohamed
      - FLINK_PARALLELISM=1
      - CHECKPOINT_INTERVAL_MS=60000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - data-platform-net
  # ---------------------------
  #  Database Services
  #----------------------------
  postgres-db:
    image: pgvector/pgvector:pg16
    restart: always
    ports:
      - "5432:5432"
    shm_size: 128mb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    env_file:
      - ./backend/.env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER" ]
      interval: 5s
      timeout: 5s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - data-platform-net

  db-migrator:
    build: ./backend/db/migrations
    depends_on:
      postgres-db:
        condition: service_healthy
    env_file:
      - ./backend/logging.env
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    volumes:
      - ./backend/seeds/seed.sql:/app/seed.sql
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - data-platform-net

  pgadmin:
    image: dpage/pgadmin4:9
    restart: always
    env_file:
      - ./backend/db/pgadmin.env
    ports:
      - "5050:80"
    depends_on:
      - postgres-db
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - data-platform-net

  # ---------------------------
  #  Frontend Services
  #----------------------------
  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:3000
      - CHOKIDAR_USEPOLLING=true # Often needed for HMR inside Docker on Windows
    # env_file:
    #   - ./frontend/.env
    depends_on:
      - backend
    networks:
      - data-platform-net

  # ---------------------------
  #  Chatbot Service
  #----------------------------
  chatbot-service:
    build:
      context: ./backend/services/Chatbot
      dockerfile: Dockerfile
    container_name: chatbot-service
    restart: unless-stopped
    ports:
      - "8004:8000"
    environment:
      - DB_DSN=postgresql://lina:123@postgres-db:5432/lina
      - OLLAMA_BASE_URL=http://ollama-chatbot:11434
      - LLM_MODEL=qwen2.5-coder:7b
    depends_on:
      - postgres-db
      - ollama-chatbot
    networks:
      - data-platform-net

  # ---------------------------
  #  S3 Backup Service
  #----------------------------
  s3-backup:
    build: ./services/s3_backup
    env_file:
      - ./services/s3_backup/.env
    volumes:
      - s3-backup-state:/data
    ports:
      - "8020:8020"
    depends_on:
      - minio
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - data-platform-net
