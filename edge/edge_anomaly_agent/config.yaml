camera:
  type: usb         # usb / csi / rtsp
  device_index: 0
  #stream_url: "http://172.21.0.238:5000/video_feed"
  width: 640
  height: 480
  fps: 10
  # # for CSI (Arducam IMX219 8MP):
  # sensor_id: 0
  # flip_method: 0
  # for RTSP:
  # rtsp_url: "rtsp://user:pass@ip/stream"

# Edge device identity
device_key: "jetson_nano_01"
camera_id: 1

kafka:
  bootstrap_servers: "172.21.0.238:9092"
  topic_anomaly: "anomaly_events"

evidence_gateway:
  upload_url: "http://172.21.0.238:8010/evidence/upload"

anomaly:
  # --- Motion detection (MOG2) ---
  mog2_history: 200
  mog2_var_threshold: 30
  mog2_detect_shadows: true
  learning_rate: 0.02
  min_object_area: 8000
  motion_downscale_width: 640
  morph_kernel: 5
  dilate_iters: 2

  # --- YOLO person detector (TensorRT YOLOv8 engine) ---
  yolo_engine: "/opt/anomaly/models/yolov8n_fp16.engine"
  yolo_conf: 0.35
  yolo_nms_thresh: 0.45
  min_bbox_area: 1600.0

  # --- IoU Tracker ---
  tracker_iou_thresh: 0.3
  tracker_max_missed: 8      # 0.8s at 10fps before track expires

  # --- Tubelet windowing ---
  window_stride: 8           # stride between windows (num_frames=16 from checkpoint)
  crop_pad: 0.1              # padding around person bounding box

  # --- Cooldown ---
  cooldown_sec: 2.0          # min seconds between published events per track

  # --- Evidence upload ---
  jpg_quality: 85

  # --- Logging ---
  print_every_sec: 5.0

student:
  checkpoint: "/opt/anomaly/models/best_student.pt"
  device: "cuda"             # cuda / cpu
  use_fp16: true             # float16 inference on CUDA
  model_version: "student-v3-multiscale"
  # image_size and num_frames are read directly from checkpoint config
