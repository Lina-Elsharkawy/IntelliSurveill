name: Test Secrets

on:
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify secrets are set
        run: |
          echo "Checking if secrets are configured..."
          
          # This checks if secrets exist (they will show as *** if set)
          # Replace these with YOUR actual secret names
          
          if [ -n "${{ secrets.POSTGRES_LOGGING_USER }}" ]; then
            echo "✅ POSTGRES_LOGGING_USER is set"
          else
            echo "❌ POSTGRES_LOGGING_USER is NOT set"
          fi
          
          if [ -n "${{ secrets.POSTGRES_LOGGING_PASSWORD }}" ]; then
            echo "✅ POSTGRES_LOGGING_PASSWORD is set"
          else
            echo "❌ POSTGRES_LOGGING_PASSWORD is NOT set"
          fi
          
          if [ -n "${{ secrets.PGADMIN_DEFAULT_EMAIL }}" ]; then
            echo "✅ PGADMIN_DEFAULT_EMAIL is set"
          else
            echo "❌ PGADMIN_DEFAULT_EMAIL is NOT set"
          fi
          
          if [ -n "${{ secrets.PGADMIN_DEFAULT_PASSWORD }}" ]; then
            echo "✅ PGADMIN_DEFAULT_PASSWORD is set"
          else
            echo "❌ PGADMIN_DEFAULT_PASSWORD is NOT set"
          fi
          
          # Add more secret checks here as needed
          
          echo ""
          echo "Done! Check above for any missing secrets."
