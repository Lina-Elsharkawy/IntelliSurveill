      responses:
        '200':
          description: List of cameras
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Camera'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/cameras/get_camera/{id}:
    get:
      operationId: getCameraById
      summary: Get camera by ID
      description: Retrieve a single camera by its ID
      tags:
        - Cameras
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Camera ID
      responses:
        '200':
          description: Camera found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Camera'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/cameras/create_camera:
    post:
      operationId: createCamera
      summary: Create a new camera
      description: Create a new camera in the system
      tags:
        - Cameras
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CameraInput'
      responses:
        '201':
          description: Camera created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Camera'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/cameras/update_camera/{id}:
    put:
      operationId: updateCamera
      summary: Update camera
      description: Update an existing camera by its ID
      tags:
        - Cameras
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Camera ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CameraInput'
      responses:
        '200':
          description: Camera updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Camera'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/cameras/delete_camera/{id}:
    delete:
      operationId: deleteCamera
      summary: Delete camera
      description: Delete a camera by its ID
      tags:
        - Cameras
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Camera ID
      responses:
        '200':
          description: Camera deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
              example:
                message: "Camera deleted successfully"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

