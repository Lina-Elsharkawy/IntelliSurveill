openapi: 3.0.3
info:
  title: Lab Access Control API
  description: |
    API for managing lab access control system including cameras, employees, visitors, 
    schedules, departments, labs, anomalies, logs, and detected people.
    
    All `/api/*` routes require JWT authentication via Bearer token.
  version: 1.0.0
  contact:
    name: API Support
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: /
    description: Current server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT obtained from Auth0

  schemas:
    # ========================
    # Common Response Schemas
    # ========================
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: "Internal server error"

    SuccessMessage:
      type: object
      properties:
        message:
          type: string
          example: "Resource deleted successfully"

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, db error]
        error:
          type: string
          description: Error message if status is 'db error'

    # ========================
    # Anomaly Schemas
    # ========================
    Anomaly:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
        description:
          type: string
          example: "Unauthorized access attempt detected"
        severity_level:
          type: string
          example: "high"

    # ========================
    # Camera Schemas
    # ========================
    Camera:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
        name:
          type: string
          example: "Main Entrance Camera"
        location:
          type: string
          example: "Building A - Main Lobby"
        lab_id:
          type: integer
          format: int64
          example: 1

    CameraInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Main Entrance Camera"
        location:
          type: string
          example: "Building A - Main Lobby"
        lab_id:
          type: integer
          format: int64
          example: 1

    # ========================
    # Department Schemas
    # ========================
    Department:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
        name:
          type: string
          example: "Computer Science"

    DepartmentInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Computer Science"

    # ========================
    # Employee Schemas
    # ========================
    Employee:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
        name:
          type: string
          example: "John Doe"
        department_id:
          type: integer
          format: int64
          example: 1

    EmployeeInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "John Doe"
        department_id:
          type: integer
          format: int64
          example: 1

    # ========================
    # Lab Schemas
    # ========================
    Lab:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
        name:
          type: string
          example: "AI Research Lab"

    LabInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "AI Research Lab"

    # ========================
    # Visitor Schemas
    # ========================
    Visitor:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
        name:
          type: string
          example: "Jane Smith"
        visit_date:
          type: string
          format: date-time
          example: "2025-12-20T10:00:00Z"
        purpose:
          type: string
          example: "Lab tour"
        contact_info:
          type: string
          example: "jane.smith@example.com"

    VisitorInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Jane Smith"
        visit_date:
          type: string
          format: date-time
          example: "2025-12-20T10:00:00Z"
        purpose:
          type: string
          example: "Lab tour"
        contact_info:
          type: string
          example: "jane.smith@example.com"

    # ========================
    # Schedule Schemas
    # ========================
    Schedule:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
        name:
          type: string
          example: "Regular Business Hours"
        access_start_time:
          type: string
          description: "Time in HH:MM:SS format"
          example: "09:00:00"
        access_end_time:
          type: string
          description: "Time in HH:MM:SS format"
          example: "17:00:00"
        applies_to_weekdays:
          type: boolean
          default: false
          example: true
        applies_to_weekends:
          type: boolean
          default: false
          example: false
        specific_dates:
          type: array
          items:
            type: string
            format: date
          example: ["2025-12-25", "2025-01-01"]

    ScheduleInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Regular Business Hours"
        access_start_time:
          type: string
          description: "Time in HH:MM:SS format"
          example: "09:00:00"
        access_end_time:
          type: string
          description: "Time in HH:MM:SS format"
          example: "17:00:00"
        applies_to_weekdays:
          type: boolean
          default: false
          example: true
        applies_to_weekends:
          type: boolean
          default: false
          example: false
        specific_dates:
          type: array
          items:
            type: string
            format: date
          example: ["2025-12-25", "2025-01-01"]

    # ========================
    # Detected Person Schemas
    # ========================
    DetectedPerson:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
        name:
          type: string
          example: "John Doe"
        additional_info:
          type: string
          example: "Wearing safety badge"
        employee_id:
          type: integer
          format: int64
          nullable: true
          example: 1
        visitor:
          type: boolean
          default: false
          example: false
        visitor_id:
          type: integer
          format: int64
          nullable: true
          example: null

    # ========================
    # Log Schemas
    # ========================
    Log:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          example: 1
        timestamp:
          type: string
          format: date-time
          example: "2025-12-20T10:30:00Z"
        detected_id:
          type: integer
          format: int64
          nullable: true
          example: 1
        camera_id:
          type: integer
          format: int64
          nullable: true
          example: 1
        anomaly_id:
          type: integer
          format: int64
          nullable: true
          example: null
        authorized:
          type: boolean
          example: true
        confidence_score:
          type: number
          format: float
          example: 0.95
        event_type:
          type: string
          example: "entry"
        location:
          type: string
          example: "Building A - Main Lobby"
        device_status:
          type: string
          example: "active"
        image_video_ref:
          type: string
          example: "s3://bucket/videos/entry_12345.mp4"
        processing_time:
          type: number
          format: float
          example: 0.234
        model_version:
          type: string
          example: "v2.1.0"

    # ========================
    # RAG Schemas
    # ========================
    RAGQueryRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: Natural language query to process
          example: "How many unauthorized access attempts were there today?"

    RAGQueryResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success, error]
          example: "success"
        data:
          type: object
          description: Query result data
        message:
          type: string
          description: Error message (only present on error)

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Resource not found"

    BadRequest:
      description: Bad request - invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Invalid request parameters"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Internal server error"

    Unauthorized:
      description: Unauthorized - Invalid or missing JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Unauthorized"

security:
  - bearerAuth: []

paths:
  # ========================
  # Health Check (Public)
  # ========================
  /health:
    get:
      operationId: getHealth
      summary: Health check endpoint
      description: Check if the server and database connection are healthy
      tags:
        - Health
      security: []
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: "ok"
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          description: Database connection error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: "db error"
                error: "Connection refused"

  # ========================
  # Anomalies
  # ========================
  /api/anomalies/get_all_anomalies:
    get:
      operationId: getAllAnomalies
      summary: Get all anomalies
      description: Retrieve a list of all anomalies in the system
      tags:
        - Anomalies
      responses:
        '200':
          description: List of anomalies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Anomaly'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/anomalies/get_anomaly/{id}:
    get:
      operationId: getAnomalyById
      summary: Get anomaly by ID
      description: Retrieve a single anomaly by its ID
      tags:
        - Anomalies
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Anomaly ID
      responses:
        '200':
          description: Anomaly found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Anomaly'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/anomalies/delete_anomaly/{id}:
    delete:
      operationId: deleteAnomaly
      summary: Delete anomaly
      description: Delete an anomaly by its ID
      tags:
        - Anomalies
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Anomaly ID
      responses:
        '200':
          description: Anomaly deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
              example:
                message: "Anomaly deleted successfully"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ========================
  # Cameras
  # ========================
  /api/cameras/get_all_cameras:
    get:
      operationId: getAllCameras
      summary: Get all cameras
      description: Retrieve a list of all cameras in the system
      tags:
