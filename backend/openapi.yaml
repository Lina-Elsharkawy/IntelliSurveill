        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/employees/delete_employee/{id}:
    delete:
      operationId: deleteEmployee
      summary: Delete employee
      description: Delete an employee by their ID
      tags:
        - Employees
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Employee ID
      responses:
        '200':
          description: Employee deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
              example:
                message: "Employee deleted successfully"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ========================
  # Labs
  # ========================
  /api/labs/get_all_labs:
    get:
      operationId: getAllLabs
      summary: Get all labs
      description: Retrieve a list of all labs in the system
      tags:
        - Labs
      responses:
        '200':
          description: List of labs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Lab'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/labs/get_lab/{id}:
    get:
      operationId: getLabById
      summary: Get lab by ID
      description: Retrieve a single lab by its ID
      tags:
        - Labs
      parameters:
        - name: id
          in: path
