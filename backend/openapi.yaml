  # ========================
  # RAG (Retrieval-Augmented Generation)
  # ========================
  /api/rag/query:
    post:
      operationId: queryRAG
      summary: Query the RAG system
      description: |
        Submit a natural language query to the RAG (Retrieval-Augmented Generation) system.
        The system will process the query and return relevant data from the database.
      tags:
        - RAG
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RAGQueryRequest'
      responses:
        '200':
          description: Query processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RAGQueryResponse'
              example:
                status: "success"
                data:
                  answer: "There were 5 unauthorized access attempts today."
        '400':
          description: Bad request - missing query text
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Query text is required"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Forbidden - security violation detected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RAGQueryResponse'
              example:
                status: "error"
                message: "Security violation: Query blocked"
        '500':
          $ref: '#/components/responses/InternalError'

