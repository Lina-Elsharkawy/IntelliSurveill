        '500':
          $ref: '#/components/responses/InternalError'

  /api/detected-people/get_person/{id}:
    get:
      operationId: getDetectedPersonById
      summary: Get detected person by ID
      description: Retrieve a single detected person by their ID
      tags:
        - Detected People
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: Detected Person ID
      responses:
        '200':
          description: Detected person found
          content:
            application/json:
