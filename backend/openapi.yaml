    description: Manage organizational departments
  - name: Detected People
    description: Access detected people records
  - name: Employees
    description: Manage employee records
  - name: Labs
    description: Manage lab facilities
  - name: Logs
    description: Access and filter access control logs
  - name: Schedules
    description: Manage access schedules
  - name: Visitors
    description: Manage visitor records
  - name: RAG
    description: Natural language query interface using RAG technology
